name: Release

# The BigWigs packager picks the CurseForge release channel from the tag's
# GitHub Release status:
#   - tag pushed with no GitHub Release        -> alpha
#   - tag with a GitHub Release marked prerelease -> beta
#   - tag with a full GitHub Release           -> release
on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. 0.1.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract release notes for this tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # Strip a leading "v" so "v0.2.0" matches "## 0.2.0" in CHANGELOG.md.
          VERSION="${TAG#v}"
          # Copy lines under the matching "## <version>" heading (which may have
          # a trailing date, e.g. "## 0.2.0 — 2026-05-29") up to the next "## ".
          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if ($2 == ver) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Guard: this only trips when CHANGELOG.md is missing a section for
          # the tag being released. On a normal release it stays quiet.
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::Add a '## $VERSION' section to CHANGELOG.md before tagging $VERSION."
            exit 1
          fi
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Package & upload
        uses: BigWigsMods/packager@v2
        with:
          args: -p 1556314
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
